name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npx vite build --base=/crm-google-ai-studio/
        env:
          VITE_SUPABASE_URL: "https://ixtwffjepcnfjehzpiyf.supabase.co"
          VITE_SUPABASE_ANON_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml4dHdmZmplcGNuZmplaHpwaXlmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxNDY0NTUsImV4cCI6MjA5MDcyMjQ1NX0.SW9D-2AVUfb3DgfdifHYqr5D_0zqfnDBNlVShKfwEJ4"
      - uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
