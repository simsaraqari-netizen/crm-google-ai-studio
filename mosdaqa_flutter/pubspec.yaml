name: mosdaqa_flutter
description: "نظام إدارة العقارات المتكامل"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Backend & State
  supabase_flutter: ^2.6.0
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.3.5

  # Routing
  go_router: ^14.2.0

  # UI & Design
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.10
  lucide_icons: ^1.0.0
  
  # Utils
  shared_preferences: ^2.3.2
  intl: ^0.19.0
  timeago: ^3.6.1
  image_picker: ^1.1.2
  flutter_image_compress: ^8.0.0
  url_launcher: ^6.3.0
  collection: ^1.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.12
  riverpod_generator: ^2.4.2
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
